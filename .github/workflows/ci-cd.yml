name: CI/CD — Build, Test & Deploy to GCP Cloud Run

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      promote_to_production:
        description: "Promote latest Staging model to Production"
        required: false
        default: "false"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: mlops-platform
  REGISTRY: gcr.io
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/mlops-platform

jobs:
  # ── 1. Lint & Type Check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint deps
        run: pip install ruff mypy pydantic-settings

      - name: Ruff lint
        run: ruff check app/ ml/ --select E,F,W --ignore E501

      - name: Type check
        run: mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # non-blocking for portfolio project

  # ── 2. Unit Tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto
        env:
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
          DEBUG: "true"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

  # ── 3. Build & Push Docker Image ──────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ── 4. Deploy to GCP Cloud Run ────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging (Cloud Run)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}-staging
          image: ${{ env.IMAGE }}:develop
          region: ${{ env.REGION }}
          flags: |
            --memory=2Gi
            --cpu=1
            --concurrency=80
            --min-instances=0
            --max-instances=5
            --timeout=300
            --set-env-vars=DEBUG=false,MLFLOW_MODEL_STAGE=Staging
          env_vars: |
            MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}

      - name: Smoke test staging
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}-staging \
            --region=${{ env.REGION }} --format='value(status.url)')
          echo "Staging URL: $URL"
          curl -f "$URL/health/live" && echo "✅ Staging health check passed"

  deploy-production:
    name: Deploy to Production (Cloud Run)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production   # requires manual approval in GitHub Environments

    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/deploy-cloudrun@v2
        id: deploy
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE }}:latest
          region: ${{ env.REGION }}
          flags: |
            --memory=4Gi
            --cpu=2
            --concurrency=80
            --min-instances=1
            --max-instances=10
            --timeout=300
            --ingress=all
          env_vars: |
            MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}
            MLFLOW_MODEL_STAGE=Production

      - name: Get service URL
        run: echo "Production URL → ${{ steps.deploy.outputs.url }}"

      - name: Smoke test production
        run: |
          curl -f "${{ steps.deploy.outputs.url }}/health" && echo "✅ Production live"

      - name: Notify on success
        if: success()
        run: |
          echo "🚀 Deployment successful: ${{ steps.deploy.outputs.url }}"

  # ── 5. Automated Retraining (drift-triggered) ─────────────────────────────
  retrain:
    name: Automated Retraining
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.promote_to_production != 'true'
    # Also triggered by external webhook from drift detector

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ML deps
        run: pip install -r requirements.txt

      - name: Run training pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          python ml/training/train.py \
            --epochs 3 \
            --batch-size 16 \
            --max-samples 2000 \
            --auto-promote

      - name: Run evaluation
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python ml/evaluation/evaluate.py

      - name: Trigger hot-reload on deployed service
        env:
          SERVICE_URL: ${{ secrets.PRODUCTION_SERVICE_URL }}
          RELOAD_SECRET: ${{ secrets.RELOAD_SECRET }}
        run: |
          curl -X POST "$SERVICE_URL/api/v1/models/reload" \
            -H "Authorization: Bearer $RELOAD_SECRET" || true
